<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroCare Payment</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #e8f5e9, #f1f8e9);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .payment-box {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        width: 100%;
        max-width: 500px;
    }
    h2 {
        text-align: center;
        color: #2e7d32;
        margin-bottom: 20px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
    }
    input, select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 1rem;
    }
    .submit-btn {
        background: #2e7d32;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 15px;
    }
    .notification {
        display: none;
        position: fixed;
        top: 20px;
        right: 20px;
        background: #388e3c;
        color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        max-width: 350px;
    }
    .notification h3 {
        margin-top: 0;
    }
</style>
</head>
<body>
    <style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: url(bagrount\ pay.jpg) no-repeat center center fixed; /* replace with your image */
        background-size: cover;
        color: #2f3e46;
    }
</style>

<div class="payment-box">
    <h2>Payment Details</h2>
    <form id="paymentForm">
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" id="address" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Payment Method</label>
            <select id="paymentMethod" required>
                <option value="">-- Select Method --</option>
                <option value="UPI">UPI</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Cash on Delivery">Cash on Delivery</option>
            </select>
        </div>
        <button type="button" class="submit-btn" onclick="confirmOrder()">Confirm Purchase</button>
    </form>
</div>

<div class="notification" id="notification"></div>

<script>
function confirmOrder() {
    const name = document.getElementById("name").value;
    const address = document.getElementById("address").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const method = document.getElementById("paymentMethod").value;

    if(!name || !address || !phone || !email || !method) {
        alert("Please fill all fields!");
        return;
    }

    // Example bill calculation (you can pass product info dynamically)
    const products = ["Canebooster", "Organic Fertilizer"];
    const total = 800;

    const notification = document.getElementById("notification");
    notification.innerHTML = `
        <h3>🎉 Order Confirmed!</h3>
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Address:</strong> ${address}</p>
        <p><strong>Phone:</strong> ${phone}</p>
        <p><strong>Email:</strong> ${email}</p>
        <p><strong>Payment Method:</strong> ${method}</p>
        <p><strong>Products:</strong> ${products.join(", ")}</p>
        <p><strong>Total Bill:</strong> ₹${total}</p>
    `;
    notification.style.display = "block";

    setTimeout(() => {
        notification.style.display = "none";
    }, 5000);
}
</script>

</body>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function confirmOrder() {
    const name = document.getElementById("name").value;
    const address = document.getElementById("address").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const method = document.getElementById("paymentMethod").value;

    if(!name || !address || !phone || !email || !method) {
        alert("Please fill all fields!");
        return;
    }

    // Calculate total
    let total = cart.reduce((sum, item) => sum + item.price, 0);
    let products = cart.map(item => item.name).join(", ");

    const notification = document.getElementById("notification");
    notification.innerHTML = `
        <h3>🎉 Order Confirmed!</h3>
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Address:</strong> ${address}</p>
        <p><strong>Phone:</strong> ${phone}</p>
        <p><strong>Email:</strong> ${email}</p>
        <p><strong>Payment Method:</strong> ${method}</p>
        <p><strong>Products:</strong> ${products}</p>
        <p><strong>Total Bill:</strong> ₹${total}</p>
    `;
    notification.style.display = "block";

    setTimeout(() => {
        notification.style.display = "none";
        localStorage.removeItem("cart"); // clear cart after purchase
        window.location.href = "shoping.html"; // ✅ automatically go back to cart page
    }, 5000);
}
</script>

</html>
