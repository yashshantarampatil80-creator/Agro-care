<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroCare - Login</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: url("background.jpg") no-repeat center center fixed; /* replace with your image */
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-box {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        width: 350px;
        text-align: center;
    }

    .login-box h2 {
        margin-bottom: 20px;
        color: #1b5e20; /* dark green */
    }

    .login-box input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #66bb6a; /* lighter green */
        border-radius: 8px;
        font-size: 1rem;
    }

    .login-box input:focus {
        outline: none;
        border-color: #2e7d32;
        box-shadow: 0 0 6px rgba(46,125,50,0.4);
    }

    .login-box button {
        width: 100%;
        padding: 12px;
        background: #388e3c; /* vibrant green */
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    .login-box button:hover {
        background: #1b5e20;
    }

    .notification {
        margin-top: 15px;
        font-size: 1rem;
        color: #2e7d32;
        display: none;
    }
</style>
</head>
<body><style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: url("bagrount\ login.jpg") no-repeat center center fixed; /* replace with your image */
        background-size: cover;
        color: #2f3e46;
    }
</style>


<div class="login-box">
    <h2>Login to AgroCare</h2>
    <form id="loginForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Email ID" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <div class="notification" id="notification">✅ Successful Login! Redirecting...</div>
</div>

<script>
    const form = document.getElementById('loginForm');
    const notification = document.getElementById('notification');

    form.addEventListener('submit', function(e) {
        e.preventDefault(); // prevent actual form submission
        notification.style.display = 'block';
        setTimeout(() => {
            window.location.href = "Home.html"; // redirect to home page
        }, 2000); // wait 2 seconds before redirect
    });
</script>

</body>
</html>
